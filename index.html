<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የኮልፌ ቀራኒዮ ክፍለ ከተማ ብልፅግና ፓርቲ ቅ/ጽ/ቤት ወጣት ክንፍ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0b0e;
            color: #ffffff;
            padding: 0; /* padding አጥፍተነዋል */
        }

        /* ራስ-ሰር ስላይደር - አሁን ከላይ ነው */
        .hero-slideshow-container {
            width: 100%;
            height: 80vh; /* ቁመቱ ትንሽ ረዘም ተደርጓል */
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            background-color: #16161a;
        }

        .hero-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            object-fit: cover;
        }

        .hero-slide.active {
            opacity: 1;
            z-index: 1;
        }

        /* ርዕሱ (አሁን ዝቅ ብሏል) */
        header {
            text-align: center;
            padding: 50px 15px; /* ከላይ እና ታች ክፍተት */
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ff9900, #ff5500, #00b4db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #8e8e93;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* የሞዛይክ መደርደሪያ */
        .gallery-wrapper {
            padding: 0 15px 40px 15px; /* ጋለሪው ብቻ padding አለው */
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            grid-auto-rows: 240px;
            grid-auto-flow: dense;
            gap: 15px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background-color: #16161a;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            z-index: 2;
        }

        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.tall { grid-row: span 2; }
        .gallery-item.big { grid-column: span 2; grid-row: span 2; }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.05);
        }

        /* በትልቁ ማሳያ (Lightbox) */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 12, 0.98);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            z-index: 2100;
        }

        /* የቀስት ቁልፎች */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            padding: 15px;
            user-select: none;
            transition: color 0.2s, transform 0.2s;
            z-index: 2100;
        }

        .nav-btn:hover {
            color: #ff9900;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .photo-counter {
            position: absolute;
            bottom: 20px;
            color: #8e8e93;
            font-size: 1rem;
            background-color: rgba(22, 22, 26, 0.8);
            padding: 6px 16px;
            border-radius: 20px;
        }

        @media (max-width: 600px) {
            .hero-slideshow-container { height: 40vh; }
            header h1 { font-size: 1.7rem; }
            .gallery-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                grid-auto-rows: 140px;
                gap: 10px;
            }
            .nav-btn { font-size: 35px; padding: 10px; }
        }
    </style>
</head>
<body>

    <!-- ራስ-ሰር ስላይደር (አሁን መጀመሪያ ነው) -->
    <div class="hero-slideshow-container" id="hero-slideshow"></div>

    <!-- ርዕሱ (ዝቅ ተደርጓል) -->
    <header>
        <h1>የኮልፌ ቀራኒዮ ክፍለ ከተማ ብልፅግና ፓርቲ ቅ/ጽ/ቤት ወጣት ክንፍ</h1>
        <p>የተመረጡ 270 የምስል መዝገቦች ስብስብ</p>
    </header>

    <!-- ጋለሪ -->
    <div class="gallery-wrapper">
        <main class="gallery-container"></main>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <span class="nav-btn prev-btn">&#10094;</span>
        <img class="lightbox-content" id="lightbox-img">
        <span class="nav-btn next-btn">&#10095;</span>
        <div class="photo-counter" id="photo-counter"></div>
    </div>

    <script>
        const totalPhotos = 270; 
        const galleryContainer = document.querySelector('.gallery-container');
        const heroSlideshow = document.getElementById('hero-slideshow');

        // 1. የላይኛውን ስላይደር ፎቶዎች ማዘጋጀት
        const slideshowCount = 10;
        for (let i = 1; i <= slideshowCount; i++) {
            const img = document.createElement('img');
            img.src = `${i}.jpg`;
            img.className = 'hero-slide';
            if (i === 1) img.classList.add('active');
            heroSlideshow.appendChild(img);
        }

        let currentSlideIdx = 0;
        const slides = document.getElementsByClassName('hero-slide');
        
        function nextSlide() {
            if (slides.length > 0) {
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = (currentSlideIdx + 1) % slides.length;
                slides[currentSlideIdx].classList.add('active');
            }
        }
        setInterval(nextSlide, 3000); // 3 ሰከንድ

        // 2. የታችኛውን 270 ፎቶዎች መደርደሪያ ማዘጋጀት
        for (let i = 1; i <= totalPhotos; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            if (i % 7 === 0) item.classList.add('big');
            else if (i % 4 === 0) item.classList.add('wide');
            else if (i % 5 === 0) item.classList.add('tall');

            item.innerHTML = `<img src="${i}.jpg" alt="ምስል ${i}" data-index="${i}" class="gallery-img" loading="lazy">`;
            galleryContainer.appendChild(item);
        }

        // Lightbox ስራዎች
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-btn');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        const photoCounter = document.getElementById('photo-counter');
        
        let currentPhotoIdx = 1;

        function showPhoto(idx) {
            currentPhotoIdx = parseInt(idx);
            
            // ወሰን መቆጣጠሪያ
            if (currentPhotoIdx > totalPhotos) currentPhotoIdx = 1;
            if (currentPhotoIdx < 1) currentPhotoIdx = totalPhotos;
            
            lightboxImg.src = `${currentPhotoIdx}.jpg`;
            photoCounter.textContent = `ምስል ${currentPhotoIdx} / ${totalPhotos}`;
        }

        galleryContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('gallery-img')) {
                lightbox.style.display = 'flex';
                showPhoto(e.target.getAttribute('data-index'));
            }
        });

        // የቀስት ቁልፎች
        nextBtn.addEventListener('click', () => showPhoto(currentPhotoIdx + 1));
        prevBtn.addEventListener('click', () => showPhoto(currentPhotoIdx - 1));

        // የኪቦርድ ቁልፎች
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') showPhoto(currentPhotoIdx + 1);
                if (e.key === 'ArrowLeft') showPhoto(currentPhotoIdx - 1);
                if (e.key === 'Escape') lightbox.style.display = 'none';
            }
        });

        closeBtn.addEventListener('click', () => lightbox.style.display = 'none');
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg && e.target !== closeBtn && !e.target.classList.contains('nav-btn')) {
                lightbox.style.display = 'none';
            }
        });
    </script>
</body>
</html>
