<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የኮልፌ ቀራኒዮ ክፍለ ከተማ ብልፅግና ፓርቲ ቅ/ጽ/ቤት ወጣት ክንፍ ጽ/ቤት</title>
    <style>
        /* Typography & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050507;
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Hero Container (Slideshow) */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-slideshow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            object-fit: cover;
            filter: brightness(0.5);
        }

        .hero-slide.active {
            opacity: 1;
        }

        /* --- Repositioned Title Section --- */
        .title-wrapper {
            position: absolute;
            bottom: 15vh;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 3;
        }

        .hero-content {
            position: relative;
            text-align: center;
            max-width: 900px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(180deg, #ffffff 0%, #a2a2a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            color: #8e8e93;
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 30px;
        }

        .cta-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.3s, background-color 0.3s;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            background-color: #e8e8ed;
        }

        /* Gallery Grid Title */
        .main-content {
            padding: 80px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: left;
            letter-spacing: -0.5px;
        }

        /* Grid Layout */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 280px;
            grid-auto-flow: dense;
            gap: 24px;
        }

        /* --- አዲስ፡ የሁሉም ፎቶዎች መግቢያ አኒሜሽን ስታይል --- */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background-color: #121214;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            
            /* ለመጀመሪያ መደበቂያ */
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, opacity 0.8s ease;
        }

        /* ስክሮል ሲደረግ ፎቶው ሲታይ የሚበራው ክላስ */
        .gallery-item.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            z-index: 2;
        }

        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.tall { grid-row: span 2; }
        .gallery-item.big { grid-column: span 2; grid-row: span 2; }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.04);
        }

        /* Premium Lightbox UI */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 7, 0.98);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .lightbox-content {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 35px;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 2100;
        }
        .close-btn:hover { color: #ffffff; }

        /* --- ግራ እና ቀኝ ቀስቶች --- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 40px;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            z-index: 2100;
            transition: color 0.3s, transform 0.3s;
        }

        .nav-btn:hover {
            color: #ffffff;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn { left: 40px; }
        .next-btn { right: 40px; }

        .photo-counter {
            position: absolute;
            bottom: 35px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .title-wrapper { bottom: 10vh; }
            .hero-content h1 { font-size: 2.2rem; }
            .hero-content p { font-size: 1.1rem; }
            .main-content { padding: 60px 20px; }
            .gallery-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                grid-auto-rows: 140px;
                gap: 14px;
            }
            .nav-btn { font-size: 30px; padding: 10px; }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-slideshow-container" id="hero-slideshow"></div>
        
        <div class="title-wrapper">
            <div class="hero-content">
                <h1>የኮልፌ ቀራኒዮ ክፍለ ከተማ ብልፅግና ፓርቲ ቅ/ጽ/ቤት ወጣት ክንፍ ጽ/ቤት</h1>
                <p>ዲጂታል ስብስብ እና የተመረጡ ምስሎች መዝገብ</p>
                <a href="#gallery" class="cta-btn">ምስሎችን ተመልከት</a>
            </div>
        </div>
    </section>

    <main class="main-content" id="gallery">
        <h2 class="section-title">የምስል መዝገቦች ስብስብ</h2>
        <div class="gallery-container"></div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <span class="nav-btn prev-btn">&#10094;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Lightbox View">
        <span class="nav-btn next-btn">&#10095;</span>
        <div class="photo-counter" id="photo-counter"></div>
    </div>

    <script>
        const totalPhotos = 270; 
        const galleryContainer = document.querySelector('.gallery-container');
        const heroSlideshow = document.getElementById('hero-slideshow');

        // 1. የላይኛው ፕሪሚየም ስላይደር ፎቶዎች
        const slideshowCount = 10; 
        const slideshowFragment = document.createDocumentFragment();
        for (let i = 1; i <= slideshowCount; i++) {
            const img = document.createElement('img');
            img.src = `${i}.jpg`;
            img.className = 'hero-slide';
            img.alt = `Slideshow Image ${i}`;
            if (i === 1) img.classList.add('active');
            slideshowFragment.appendChild(img);
        }
        heroSlideshow.appendChild(slideshowFragment);

        let currentSlideIdx = 0;
        const slides = document.getElementsByClassName('hero-slide');
        
        function nextSlide() {
            if (slides.length > 0) {
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = (currentSlideIdx + 1) % slides.length;
                slides[currentSlideIdx].classList.add('active');
            }
        }
        setInterval(nextSlide, 3500);

        // 2. የታችኛው 270 የፎቶ ካርዶች መደርደሪያ 
        const galleryFragment = document.createDocumentFragment();
        for (let i = 1; i <= totalPhotos; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            // የካርዶችን ቅርጽ ይወስናል
            if (i % 9 === 0) item.classList.add('big');
            else if (i % 4 === 0) item.classList.add('wide');
            else if (i % 5 === 0) item.classList.add('tall');

            item.innerHTML = `<img src="${i}.jpg" alt="የምስል መዝገብ ቁጥር ${i}" data-index="${i}" class="gallery-img" loading="lazy" onerror="this.style.display='none';">`;
            galleryFragment.appendChild(item);
        }
        galleryContainer.appendChild(galleryFragment);

        // --- አዲስ፡ ሁሉም ፎቶዎች በየተራ አኒሜት እያደረጉ እንዲገቡ ማድረጊያ ጃቫስክሪፕት ---
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            let delayCounter = 0;
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const item = entry.target;
                    // በአንድ ጊዜ ለሚታዩ ፎቶዎች ቅደም ተከተል (stagger effect) መስጠት
                    setTimeout(() => {
                        item.classList.add('reveal');
                    }, delayCounter * 100); 
                    delayCounter++;
                    observer.unobserve(item); // አንዴ አኒሜት ካደረገ በኋላ ደግሞ እንዳይደግም
                }
            });
        }, observerOptions);

        // ሁሉንም የጋለሪ ካርዶች ለአሰሳው መመዝገብ
        document.querySelectorAll('.gallery-item').forEach(item => {
            observer.observe(item);
        });

        // Lightbox አሰሳ ስራዎች
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-btn');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        const photoCounter = document.getElementById('photo-counter');
        
        let currentPhotoIdx = 1;

        function updateLightbox(idx) {
            currentPhotoIdx = parseInt(idx);
            
            if (currentPhotoIdx > totalPhotos) currentPhotoIdx = 1;
            if (currentPhotoIdx < 1) currentPhotoIdx = totalPhotos;
            
            lightboxImg.src = `${currentPhotoIdx}.jpg`;
            photoCounter.textContent = `ምስል ${currentPhotoIdx} ከ ${totalPhotos}`;
        }

        galleryContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('gallery-img')) {
                lightbox.style.display = 'flex';
                updateLightbox(e.target.getAttribute('data-index'));
            }
        });

        nextBtn.addEventListener('click', () => updateLightbox(currentPhotoIdx + 1));
        prevBtn.addEventListener('click', () => updateLightbox(currentPhotoIdx - 1));

        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') updateLightbox(currentPhotoIdx + 1);
                if (e.key === 'ArrowLeft') updateLightbox(currentPhotoIdx - 1);
                if (e.key === 'Escape') lightbox.style.display = 'none';
            }
        });

        closeBtn.addEventListener('click', () => lightbox.style.display = 'none');
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg && e.target !== closeBtn && !e.target.classList.contains('nav-btn')) {
                lightbox.style.display = 'none';
            }
        });
    </script>
</body>
            </html>
