<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የኮልፌ ቀራኒዮ ክፍለ ከተማ ብልፅግና ፓርቲ ቅ/ጽ/ቤት ወጣት ክንፍ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0b0e;
            color: #ffffff;
            padding: 40px 15px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ff9900, #ff5500, #00b4db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #8e8e93;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* ራስ-ሰር ስላይደር - ከነጭ ማራኪ ጥላ ጋር */
        .hero-slideshow-container {
            width: 100%;
            max-width: 1300px;
            height: 450px;
            margin: 0 auto 50px auto;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            /* ግልፅነቱ የጨመረ ደመቅ ያለ ነጭ ጥላ (White Glow Shadow) */
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.25); 
            background-color: #16161a;
        }

        .hero-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            object-fit: cover;
        }

        .hero-slide.active {
            opacity: 1;
            z-index: 1;
        }

        /* የሞዛይክ መደርደሪያ */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            grid-auto-rows: 240px;
            grid-auto-flow: dense;
            gap: 15px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* የፎቶዎቹ ሳጥን - ከነጭ ማራኪ ጥላ ጋር */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background-color: #16161a;
            /* እያንዳንዱ ፎቶ ላይ እንዲያርፍ የተደረገ ነጭ ጥላ (White Shadow) */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15); 
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* ፎቶው ላይ ማውዝ ሲያርፍ (Hover ሲሆን) ጥላው ይበልጥ ጎልቶ እንዲበራ ማድረግ */
        .gallery-item:hover {
            transform: scale(1.02);
            z-index: 2;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.35); /* የንፅፅር ግልፅነቱ እዚህ ላይ ይጨምራል */
        }

        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.tall { grid-row: span 2; }
        .gallery-item.big { grid-column: span 2; grid-row: span 2; }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.05);
        }

        /* በትልቁ ማሳያ */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 12, 0.98);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2); /* በትልቁ ሲከፈትም የነጭ ጥላ አለው */
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
        }

        .photo-counter {
            position: absolute;
            bottom: 20px;
            color: #8e8e93;
            font-size: 1rem;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.6rem; }
            .hero-slideshow-container { height: 250px; margin-bottom: 30px; }
            .gallery-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                grid-auto-rows: 150px;
                gap: 10px;
            }
            .gallery-item.wide, .gallery-item.big { grid-column: span 2; }
            .gallery-item.tall { grid-row: span 2; }
        }
    </style>
</head>
<body>

    <header>
        <h1>የኮልፌ ቀራኒዮ ክፍለ ከተማ ብልፅግና ፓርቲ ቅ/ጽ/ቤት ወጣት ክንፍ</h1>
        <p>የተመረጡ 270 የምስል መዝገቦች ስብስብ</p>
    </header>

    <div class="hero-slideshow-container" id="hero-slideshow"></div>

    <main class="gallery-container"></main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="photo-counter" id="photo-counter"></div>
    </div>

    <script>
        const totalPhotos = 270; 
        const galleryContainer = document.querySelector('.gallery-container');
        const heroSlideshow = document.getElementById('hero-slideshow');

        // 1. የላይኛው ስላይደር (50 ፎቶዎች)
        const slideshowCount = 50; 
        for (let i = 1; i <= slideshowCount; i++) {
            const img = document.createElement('img');
            img.src = `${i}.jpg`;
            img.className = 'hero-slide';
            if (i === 1) img.classList.add('active');
            heroSlideshow.appendChild(img);
        }

        let currentSlideIdx = 0;
        const slides = document.getElementsByClassName('hero-slide');
        
        function nextSlide() {
            if (slides.length > 0) {
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = (currentSlideIdx + 1) % slides.length;
                slides[currentSlideIdx].classList.add('active');
            }
        }
        setInterval(nextSlide, 2000);

        // 2. የታችኛው የሞዛይክ መደርደሪያ
        for (let i = 1; i <= totalPhotos; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            if (i % 7 === 0) item.classList.add('big');
            else if (i % 4 === 0) item.classList.add('wide');
            else if (i % 5 === 0) item.classList.add('tall');

            item.innerHTML = `<img src="${i}.jpg" alt="ምስል ${i}" class="gallery-img" loading="lazy">`;
            galleryContainer.appendChild(item);
        }

        // Lightbox ስራዎች
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-btn');
        const photoCounter = document.getElementById('photo-counter');

        galleryContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('gallery-img')) {
                lightbox.style.display = 'flex';
                lightboxImg.src = e.target.src;
                photoCounter.textContent = `${e.target.alt} / ${totalPhotos}`;
            }
        });

        closeBtn.addEventListener('click', () => lightbox.style.display = 'none');
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg && e.target !== closeBtn) {
                lightbox.style.display = 'none';
            }
        });
    </script>
</body>
</html>
